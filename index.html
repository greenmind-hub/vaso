<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenMind</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: radial-gradient(circle at top, #020617, #020617);
  color: white;
}

/* NAVBAR */
nav {
  position: fixed;
  width: 100%;
  padding: 20px 10%;
  display: flex;
  justify-content: space-between;
  backdrop-filter: blur(10px);
  background: rgba(2, 6, 23, 0.6);
  z-index: 1000;
}

nav h2 {
  color: #22c55e;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  padding: 0 10%;
}

.hero h1 {
  font-size: 3.5rem;
  max-width: 600px;
}

.hero span {
  color: #22c55e;
}

.hero p {
  margin-top: 20px;
  opacity: 0.7;
}

/* BUTTON */
.btn {
  margin-top: 30px;
  padding: 14px 28px;
  border-radius: 10px;
  background: linear-gradient(90deg, #22c55e, #4ade80);
  color: black;
  border: none;
  cursor: pointer;
  font-weight: 600;
}

/* SECTIONS */
section {
  padding: 100px 10%;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 30px;
  margin-top: 40px;
}

/* CARD */
.card {
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(34,197,94,0.2);
}

/* FORM */
.form-box {
  max-width: 700px;
  margin: auto;
  margin-top: 40px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(34,197,94,0.2);
}

.form-group {
  margin-bottom: 25px;
}

.form-group label {
  display: block;
  margin-bottom: 10px;
  opacity: 0.8;
}

.options {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.options button {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid rgba(34,197,94,0.3);
  background: transparent;
  color: white;
  cursor: pointer;
}

.options button.active {
  background: #22c55e;
  color: black;
}

input, textarea {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin-top: 5px;
  background: rgba(255,255,255,0.05);
  color: white;
}

/* SUCCESS */
.success {
  display: none;
  margin-top: 20px;
  color: #22c55e;
  text-align: center;
}

</style>
</head>

<body>

<nav>
  <h2>GreenMind</h2>
</nav>

<section class="hero">
  <div>
    <h1>O futuro do cuidado com plantas é <span>automático</span></h1>
    <p>Sensores e inteligência cuidando das suas plantas por você.</p>
    <button class="btn" onclick="scrollToForm()">Quero participar</button>
  </div>
</section>

<section>
  <h2>Conheça a GreenMind</h2>
  <div class="grid">
    <div class="card">🌱 Sensores de Umidade do Solo</div>
    <div class="card">🧠 Inteligência Artificial</div>
    <div class="card">⚡ Irrigação Automática</div>
  </div>
</section>

<section id="form-section">
  <h2 style="text-align:center;">Precisamos da sua opinião sincera</h2>

  <form class="form-box" action="https://formsubmit.co/contato.greenmind@gmail.com" method="POST">

    <input type="hidden" name="_subject" value="Nova resposta - GreenMind">
    <input type="hidden" name="_captcha" value="false">

    <!-- Pergunta 1 -->
    <div class="form-group">
      <label>Você tem dificuldade para cuidar de plantas?</label>
      <div class="options">
        <button type="button" onclick="select(this, 'dificuldade', 'Sim')">Sim</button>
        <button type="button" onclick="select(this, 'dificuldade', 'Às vezes')">Às vezes</button>
        <button type="button" onclick="select(this, 'dificuldade', 'Não')">Não</button>
      </div>
      <input type="hidden" name="dificuldade" required>
    </div>

    <!-- Pergunta 2 -->
    <div class="form-group">
      <label>Você usaria uma solução automatizada?</label>
      <div class="options">
        <button type="button" onclick="select(this, 'interesse', 'Com certeza')">Com certeza</button>
        <button type="button" onclick="select(this, 'interesse', 'Talvez')">Talvez</button>
        <button type="button" onclick="select(this, 'interesse', 'Não')">Não</button>
      </div>
      <input type="hidden" name="interesse" required>
    </div>

    <!-- Pergunta 3 -->
    <div class="form-group">
      <label>Quanto você pagaria por mês?</label>
      <input type="text" name="preco" placeholder="Ex: R$15" required>
    </div>

    <!-- Sugestão -->
    <div class="form-group">
      <label>Sugestões (opcional)</label>
      <textarea name="sugestoes"></textarea>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label>Seu email</label>
      <input type="email" name="email" required>
    </div>

    <button class="btn" type="submit">Enviar</button>

    <div class="success">Resposta enviada com sucesso 🚀</div>

  </form>
</section>

<script>
function select(button, name, value) {
  const group = button.parentElement;
  group.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
  button.classList.add('active');

  group.parentElement.querySelector('input').value = value;
}

function scrollToForm() {
  document.getElementById("form-section").scrollIntoView({ behavior: "smooth" });
}
</script>

</body>
</html>
